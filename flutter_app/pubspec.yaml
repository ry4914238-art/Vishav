name: vishav
description: Ephemeral camera-first social media platform (Snapchat-like)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & Media
  camera: ^0.10.4
  image_picker: ^1.0.2
  image: ^4.0.17
  video_player: ^2.7.2

  # Real-time Communication
  socket_io_client: ^2.0.2

  # Authentication & Security
  jwt_decoder: ^2.0.1
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.1

  # State Management
  provider: ^6.0.7

  # Networking
  dio: ^5.3.1
  http: ^1.1.0

  # Database & Storage
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Components
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.7
  lottie: ^2.4.0

  # Notifications
  firebase_messaging: ^14.6.0
  local_notifications: ^0.0.1

  # Utilities
  path_provider: ^2.1.0
  intl: ^0.19.0
  permission_handler: ^11.4.4
  package_info_plus: ^4.1.0
  connectivity_plus: ^5.0.1
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.3
  mockito: ^5.4.4
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/anime_avatars/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
